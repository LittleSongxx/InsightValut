name: insightvault

x-common-backend-env: &common-backend-env # 项目路径（写死在镜像里，不需要改）
  PROJECT_ROOT: /app
  PYTHONUNBUFFERED: "1"

  # ---------- MinerU ----------
  MINERU_MODEL_SOURCE: modelscope
  MODELSCOPE_OFFLINE: "0"
  XDG_CACHE_HOME: /app/.cache
  MODELSCOPE_CACHE: /app/.cache/modelscope
  HF_HOME: /app/.cache/huggingface
  HF_HUB_CACHE: /app/.cache/huggingface/hub
  TRANSFORMERS_CACHE: /app/.cache/huggingface/transformers
  MD_ROOT_DIR: ./temp-files/
  # 不填则跳过 PDF 解析（MD/TXT 导入不受影响）
  MINERU_API_TOKEN: ${MINERU_API_TOKEN:-}
  MINERU_BASE_URL: https://mineru.net/api/v4

  # ---------- 大模型 ----------
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
  LLM_DEFAULT_MODEL: qwen3.6-plus-2026-04-02
  VL_MODEL: qwen3-vl-flash
  LLM_DEFAULT_TEMPERATURE: "0.1"

  # ---------- Embedding ----------
  BGE_M3_PATH: /app/.cache/models/bge-m3
  BGE_M3: BAAI/bge-m3
  BGE_DEVICE: cpu
  BGE_FP16: "0"
  ITEM_NAME_DIAG: "1"
  EMBEDDING_DIM: "1024"

  # ---------- 重排（DashScope API，无需本地模型） ----------
  RERANKER_MODE: dashscope
  DASHSCOPE_RERANK_MODEL: ${DASHSCOPE_RERANK_MODEL:-gte-rerank-v2}
  DASHSCOPE_RERANK_BASE_URL: ${DASHSCOPE_RERANK_BASE_URL:-https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank}
  BGE_RERANKER_LARGE: ${BGE_RERANKER_LARGE:-BAAI/bge-reranker-v2-m3}
  BGE_RERANKER_DEVICE: cpu
  BGE_RERANKER_FP16: "0"

  # ---------- 日志 ----------
  LOG_CONSOLE_ENABLE: "True"
  LOG_CONSOLE_LEVEL: INFO
  LOG_FILE_ENABLE: "True"
  LOG_FILE_LEVEL: INFO
  LOG_FILE_RETENTION: "7 days"
  MONGO_DB_NAME: ${MONGO_DB_NAME:-insightvault_rag}
  CHUNKS_COLLECTION: ${CHUNKS_COLLECTION:-kb_chunks}
  ITEM_NAME_COLLECTION: ${ITEM_NAME_COLLECTION:-kb_item_names}
  ENTITY_NAME_COLLECTION: ${ENTITY_NAME_COLLECTION:-kb_entities}
  MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-127.0.0.1:19100}
  HYBRID_DENSE_WEIGHT: ${HYBRID_DENSE_WEIGHT:-0.75}
  HYBRID_SPARSE_WEIGHT: ${HYBRID_SPARSE_WEIGHT:-0.25}
  ITEM_NAME_DENSE_WEIGHT: ${ITEM_NAME_DENSE_WEIGHT:-0.85}
  ITEM_NAME_SPARSE_WEIGHT: ${ITEM_NAME_SPARSE_WEIGHT:-0.15}
  BM25_TOP_K: ${BM25_TOP_K:-8}
  BM25_CANDIDATE_LIMIT: ${BM25_CANDIDATE_LIMIT:-800}
  BM25_K1: ${BM25_K1:-1.5}
  BM25_B: ${BM25_B:-0.75}
  RRF_WEIGHT_EMBEDDING: ${RRF_WEIGHT_EMBEDDING:-1.0}
  RRF_WEIGHT_HYDE: ${RRF_WEIGHT_HYDE:-0.9}
  RRF_WEIGHT_BM25: ${RRF_WEIGHT_BM25:-0.7}
  RRF_WEIGHT_KG: ${RRF_WEIGHT_KG:-0.8}

services:
  # ──────────────────────────────────────────
  # MongoDB（文档元数据 + 导入历史）
  # ──────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: insightvault-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_EXT_PORT:-27018}:27017"
    volumes:
      - ./.docker-data/mongodb:/data/db

  # ──────────────────────────────────────────
  # Redis（查询缓存）
  # ──────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: insightvault-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./.docker-data/redis:/data

  # ──────────────────────────────────────────
  # etcd（Milvus 元数据存储）
  # ──────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: insightvault-etcd
    restart: unless-stopped
    command:
      [
        "etcd",
        "--advertise-client-urls=http://etcd:2379",
        "--listen-client-urls=http://0.0.0.0:2379",
        "--data-dir=/etcd",
      ]
    volumes:
      - ./.docker-data/etcd:/etcd

  # ──────────────────────────────────────────
  # MinIO（PDF 文件对象存储）
  # ──────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    container_name: insightvault-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-19100}:9000"
      - "${MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - ./.docker-data/minio:/data

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: insightvault-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/knowledge-base-files || true &&
      mc anonymous set download local/knowledge-base-files || true
      "

  # ──────────────────────────────────────────
  # Milvus（向量数据库）
  # ──────────────────────────────────────────
  milvus:
    image: milvusdb/milvus:v2.6.3
    container_name: insightvault-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
    depends_on:
      - etcd
      - minio
      - minio-init
    ports:
      - "${MILVUS_PORT:-19531}:19530"
      - "${MILVUS_DASHBOARD_PORT:-9092}:9091"
    volumes:
      - ./.docker-data/milvus:/var/lib/milvus

  # ──────────────────────────────────────────
  # Neo4j（图数据库，存储实体关系）
  # ──────────────────────────────────────────
  neo4j:
    image: neo4j:5.26-community
    container_name: insightvault-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/insightvault123
    ports:
      - "${NEO4J_BOLT_PORT:-7688}:7687"
      - "${NEO4J_HTTP_PORT:-7475}:7474"
    volumes:
      - ./.docker-data/neo4j/data:/data
      - ./.docker-data/neo4j/logs:/logs

  # ──────────────────────────────────────────
  # app-import（文件导入服务，容器 8000 / 宿主默认 18000）
  # ──────────────────────────────────────────
  app-import:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-https://pypi.org/simple}
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-1200}
        PIP_RETRIES: ${PIP_RETRIES:-10}
    container_name: insightvault-app-import
    restart: unless-stopped
    command: python -m app.import_process.api.file_import_service
    environment:
      <<: *common-backend-env
      # 容器内部用服务名访问（env_file 里的 127.0.0.1 在容器内无效）
      MONGO_URL: mongodb://mongodb:27017
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: knowledge-base-files
      MINIO_PDF_DIR: pdf_files
      MINIO_IMG_DIR: upload-images
      MINIO_SECURE: "False"
      MILVUS_URL: http://milvus:19530
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_DATABASE: neo4j
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: insightvault123
      QUERY_CACHE_REDIS_URL: redis://redis:6379/0
      MILVUS_FORCE_RECREATE_COLLECTION: "0"
    ports:
      - "${IMPORT_PORT:-18000}:8000"
    volumes:
      - ./app:/app/app
      - ./.cache:/app/.cache
      - ./logs:/app/logs
      - ./output:/app/output
      - ./prompts:/app/prompts:ro
    depends_on:
      - mongodb
      - redis
      - milvus
      - minio
      - minio-init
      - neo4j

  # ──────────────────────────────────────────
  # app-query（查询服务，端口 8001）
  # ──────────────────────────────────────────
  app-query:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-https://pypi.org/simple}
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-1200}
        PIP_RETRIES: ${PIP_RETRIES:-10}
    container_name: insightvault-app-query
    restart: unless-stopped
    command: python -m app.query_process.api.query_service
    environment:
      <<: *common-backend-env
      # 容器内部用服务名访问
      MONGO_URL: mongodb://mongodb:27017
      MILVUS_URL: http://milvus:19530
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_DATABASE: neo4j
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: insightvault123
      MCP_DASHSCOPE_BASE_URL: https://dashscope.aliyuncs.com/api/v1/mcps/WebSearch/sse
      QUERY_CACHE_REDIS_URL: redis://redis:6379/0
    ports:
      - "${QUERY_PORT:-8001}:8001"
    volumes:
      - ./app:/app/app
      - ./.cache:/app/.cache
      - ./logs:/app/logs
      - ./output:/app/output
      - ./docs:/app/docs:ro
      - ./prompts:/app/prompts:ro
      - ./reports:/app/reports
    depends_on:
      - mongodb
      - redis
      - milvus
      - neo4j

  # ──────────────────────────────────────────
  # app-frontend（Vite 开发服务器，固定 Node 22）
  # ──────────────────────────────────────────
  app-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insightvault-app-frontend
    restart: unless-stopped
    environment:
      FRONTEND_PORT: "3002"
      VITE_QUERY_TARGET: http://app-query:8001
      VITE_IMPORT_TARGET: http://app-import:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3002}:3002"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - app-import
      - app-query

volumes:
  frontend_node_modules:
